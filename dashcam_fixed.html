<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DashCam">
<title>DashCam</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;700&display=swap');
:root {
  --red:#ff1a1a;--amber:#ffb800;--green:#00ff88;
  --bg:#0a0a0a;--panel:#111;--border:#222;--text:#e8e8e8;--muted:#555;
  --mono:'Share Tech Mono',monospace;--display:'Oswald',sans-serif;
  --safe-top:env(safe-area-inset-top,44px);--safe-bottom:env(safe-area-inset-bottom,34px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);overflow:hidden;user-select:none;-webkit-user-select:none}
#app{display:flex;flex-direction:column;width:100%;height:100%;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:rgba(10,10,10,.95);border-bottom:1px solid var(--border);flex-shrink:0}
#logo{font-family:var(--display);font-size:22px;font-weight:700;letter-spacing:3px}
#logo span{color:var(--red)}
#rec-ind{display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:2px;color:var(--muted)}
#rec-ind.on{color:var(--red)}
#rec-dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
#rec-ind.on #rec-dot{background:var(--red);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#clip-count-wrap{font-size:11px;letter-spacing:1px;color:var(--muted)}
#clip-count-wrap span{color:var(--amber)}
#viewport{position:relative;flex:1;background:#000;overflow:hidden}
#video{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
#preview-canvas{display:block;width:100%;height:100%}
#viewport.preview-off #preview-canvas{opacity:0}
#no-cam{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);font-size:12px;letter-spacing:2px;pointer-events:none}
#no-cam svg{opacity:.15}
#viewport:not(.preview-off) #no-cam{display:none}
#buf-bar-wrap{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.05)}
#buf-bar{height:100%;width:0;background:linear-gradient(90deg,var(--red),var(--amber));transition:width .3s linear}
#flash-el{position:absolute;inset:0;opacity:0;border:3px solid var(--red);pointer-events:none}
#flash-el.go{animation:flash .6s ease-out forwards}
@keyframes flash{0%{opacity:.8}100%{opacity:0}}
#countdown-el{position:absolute;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none}
#countdown-el span{font-family:var(--display);font-size:80px;font-weight:700;color:var(--red);text-shadow:0 0 40px rgba(255,26,26,.8)}
#clips-fab{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.75);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:9px;letter-spacing:1px;padding:5px 8px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:4px;backdrop-filter:blur(4px)}
#fab-count{background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;display:none}
#fab-count.show{display:block}
#controls{background:var(--panel);border-top:1px solid var(--border);padding:14px 16px;flex-shrink:0;display:flex;flex-direction:column;gap:12px}
#ctrl-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.ctrl-col{display:flex;flex-direction:column;align-items:center;gap:4px}
.ctrl-lbl{font-size:9px;letter-spacing:2px;color:var(--muted)}
.tog{position:relative;width:50px;height:26px;cursor:pointer}
.tog input{display:none}
.tog-track{position:absolute;inset:0;background:#333;border-radius:13px;border:1px solid #444;transition:background .3s}
.tog input:checked+.tog-track{background:var(--green);border-color:var(--green)}
.tog-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .3s;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.tog input:checked~.tog-thumb{transform:translateX(24px)}
.icon-btn{background:#1a1a1a;border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:8px 14px;border-radius:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
#rec-btn{background:#1a0000;border:1px solid #330000;color:var(--red);font-family:var(--display);font-size:12px;letter-spacing:3px;font-weight:700;padding:10px 18px;border-radius:6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;max-width:120px;transition:all .2s}
#rec-btn.on{border-color:var(--red);box-shadow:0 0 14px rgba(255,26,26,.2)}
#rec-dot2{width:10px;height:10px;border-radius:50%;background:var(--red);opacity:.35}
#rec-btn.on #rec-dot2{opacity:1;animation:blink 1s infinite}
#inc-btn{width:100%;height:70px;background:radial-gradient(ellipse at 50% 40%,#ff3333,#cc0000,#800000);border:none;border-radius:14px;cursor:pointer;font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:6px;color:#fff;text-shadow:0 0 20px rgba(255,100,100,.6);box-shadow:0 4px 20px rgba(255,26,26,.4),inset 0 1px 0 rgba(255,180,180,.2);transition:all .1s}
#inc-btn:active{transform:scale(.97);box-shadow:0 2px 10px rgba(255,26,26,.7),0 0 0 2px var(--red)}
#inc-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
#inc-lbl{font-size:9px;letter-spacing:2px;color:var(--muted);text-align:center}
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.93);border:1px solid var(--border);border-radius:12px;padding:20px 28px;font-size:13px;letter-spacing:1px;text-align:center;z-index:400;max-width:85%;display:none;backdrop-filter:blur(12px)}
#toast.show{display:block;animation:pop-in .2s ease-out}
@keyframes pop-in{from{opacity:0;transform:translate(-50%,-50%) scale(.9)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
#toast-icon{font-size:26px;margin-bottom:8px}
#toast-msg{line-height:1.6}
#saving{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:300}
#saving.show{display:flex}
#saving-ring{width:56px;height:56px;border:3px solid #222;border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#saving-label{font-family:var(--display);font-size:14px;letter-spacing:4px}
#clips-panel{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:350;display:none;flex-direction:column;padding-top:var(--safe-top);padding-bottom:var(--safe-bottom)}
#clips-panel.open{display:flex}
#clips-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
#clips-title{font-family:var(--display);font-size:16px;font-weight:700;letter-spacing:3px}
#clips-close{background:#1a1a1a;border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer}
#clips-body{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
#clips-empty{text-align:center;color:var(--muted);font-size:12px;letter-spacing:1px;padding:40px 0}
.clip-item{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.clip-info{flex:1;overflow:hidden}
.clip-name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.clip-meta{font-size:10px;color:var(--muted);margin-top:3px}
.clip-addr{font-size:10px;color:var(--green);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.clip-btns{display:flex;gap:8px;flex-shrink:0}
.clip-btn{background:#1a1a1a;border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;padding:5px 10px;border-radius:5px;cursor:pointer}
.clip-btn.share{border-color:#1a3355;color:#5599ff}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="logo">DASH<span>CAM</span></div>
    <div id="rec-ind"><div id="rec-dot"></div><span id="rec-status">STANDBY</span></div>
    <div id="clip-count-wrap">CLIPS: <span id="clip-num">0</span></div>
  </div>
  <div id="viewport" class="preview-off">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="preview-canvas"></canvas>
    <div id="no-cam">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
      </svg>
      CAMERA INACTIVE
    </div>
    <div id="buf-bar-wrap"><div id="buf-bar"></div></div>
    <div id="flash-el"></div>
    <div id="countdown-el"><span id="countdown-num"></span></div>
    <div id="clips-fab" onclick="openClips()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V7z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      CLIPS <span id="fab-count">0</span>
    </div>
  </div>
  <div id="controls">
    <div id="ctrl-row">
      <div class="ctrl-col">
        <label class="tog">
          <input type="checkbox" id="prev-chk" onchange="setPreview(this.checked)">
          <div class="tog-track"></div><div class="tog-thumb"></div>
        </label>
        <div class="ctrl-lbl">PREVIEW</div>
      </div>
      <button class="icon-btn" onclick="flipCam()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>
        </svg>
        FLIP
      </button>
      <button id="rec-btn" onclick="toggleRec()">
        <div id="rec-dot2"></div>
        <span id="rec-lbl">START</span>
      </button>
    </div>
    <button id="inc-btn" onclick="onIncident()" disabled>&#11044; INCIDENT</button>
    <div id="inc-lbl">SAVES 20s BACK + 5s AFTER WITH LOCATION</div>
  </div>
</div>
<div id="saving"><div id="saving-ring"></div><div id="saving-label">SAVING...</div></div>
<div id="toast"><div id="toast-icon"></div><div id="toast-msg"></div></div>
<div id="clips-panel">
  <div id="clips-hdr">
    <div id="clips-title">SAVED CLIPS</div>
    <button id="clips-close" onclick="closeClips()">&#x2715; CLOSE</button>
  </div>
  <div id="clips-body"><div id="clips-empty">NO CLIPS SAVED YET</div></div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
var LOOP_SECS = 20;   // recorder restarts every 20s — clip will be up to 20s before + 5s after
var AFTER_SECS = 5;

// ─── STATE ───────────────────────────────────────────────────────────────────
var video          = document.getElementById('video');
var canvas         = document.getElementById('preview-canvas');
var ctx            = canvas.getContext('2d');
canvas.width       = 1280;
canvas.height      = 720;

var mediaStream    = null;
var canvasStream   = null;
var loopTimer      = null;
var isRecording    = false;
var incidentActive = false;
var incidentMs     = 0;
var afterTimer     = null;
var countdownRaf   = null;
var facingMode     = 'environment';
var geoPromise     = null;
var clips          = [];
var toastTimer     = null;
var wakeLock       = null;

var gpsLat    = null;
var gpsLng    = null;
var gpsSpeed  = 0;
var gpsAddr   = '';
var gpsFix    = false;

// ─── DRAW LOOP ────────────────────────────────────────────────────────────────
function drawLoop() {
  requestAnimationFrame(drawLoop);
  var W = canvas.width, H = canvas.height;
  if (mediaStream && video.readyState >= 2) {
    if (facingMode === 'user') {
      ctx.save(); ctx.translate(W,0); ctx.scale(-1,1);
      ctx.drawImage(video,0,0,W,H); ctx.restore();
    } else {
      ctx.drawImage(video,0,0,W,H);
    }
  } else {
    ctx.fillStyle='#050505'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#1a1a1a'; ctx.font='18px "Share Tech Mono",monospace';
    ctx.textAlign='center'; ctx.fillText('CAMERA INACTIVE',W/2,H/2); ctx.textAlign='left';
  }
  // scanlines
  ctx.fillStyle='rgba(0,0,0,0.03)';
  for(var sy=0;sy<H;sy+=4) ctx.fillRect(0,sy,W,2);
  // corners
  ctx.strokeStyle='rgba(255,26,26,0.45)'; ctx.lineWidth=2;
  var b=30;
  [[10,10,1,1],[W-10,10,-1,1],[10,H-10,1,-1],[W-10,H-10,-1,-1]].forEach(function(c){
    ctx.beginPath();
    ctx.moveTo(c[0]+c[2]*b,c[1]); ctx.lineTo(c[0],c[1]); ctx.lineTo(c[0],c[1]+c[3]*b);
    ctx.stroke();
  });
  // time/date
  var now=new Date();
  var hms=now.toTimeString().slice(0,8);
  var date=now.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
  ctx.fillStyle='rgba(0,0,0,0.55)'; rrect(ctx,10,10,178,52,4); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1; rrect(ctx,10,10,178,52,4); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 22px "Share Tech Mono",monospace'; ctx.fillText(hms,18,36);
  ctx.fillStyle='#aaa'; ctx.font='11px "Share Tech Mono",monospace'; ctx.fillText(date,18,52);
  // speed
  var spd=gpsSpeed!=null?String(gpsSpeed):'--';
  ctx.fillStyle='rgba(0,0,0,0.55)'; rrect(ctx,W-80,10,70,52,4); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.1)'; ctx.lineWidth=1; rrect(ctx,W-80,10,70,52,4); ctx.stroke();
  ctx.fillStyle='#ffb800'; ctx.font='bold 26px "Share Tech Mono",monospace';
  ctx.textAlign='center'; ctx.fillText(spd,W-45,38);
  ctx.fillStyle='#888'; ctx.font='10px "Share Tech Mono",monospace'; ctx.fillText('KM/H',W-45,52);
  ctx.textAlign='left';
  // rec dot
  if(isRecording&&Math.floor(Date.now()/500)%2===0){
    ctx.fillStyle='#ff1a1a'; ctx.beginPath(); ctx.arc(W-12,18,5,0,Math.PI*2); ctx.fill();
  }
  // address bar
  var addr=gpsAddr||(gpsLat!==null?gpsLat.toFixed(5)+', '+gpsLng.toFixed(5):'Acquiring GPS...');
  var bH=24,bY=H-bH-10,bW=W-28;
  ctx.fillStyle='rgba(0,0,0,0.6)'; rrect(ctx,14,bY,bW,bH,3); ctx.fill();
  ctx.fillStyle='#00ff88'; ctx.font='12px "Share Tech Mono",monospace';
  var maxC=Math.floor((bW-12)/7.5);
  ctx.fillText(addr.length>maxC?addr.slice(0,maxC-1)+'...':addr,20,bY+16);
}

function rrect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();
}

drawLoop();

// ─── GEOCODE — Nominatim ─────────────────────────────────────────────────────
// Called only on first GPS fix and on incident press.
// Nominatim returns full address with house_number when zoom=18.
function reverseGeocode(lat,lng){
  var url='https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lng+'&format=json&zoom=18&addressdetails=1';
  return fetch(url,{headers:{'Accept':'application/json'}})
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d||!d.address) return coords(lat,lng);
      var a=d.address;
      var road=a.road||a.pedestrian||a.cycleway||a.path||a.footway||a.street||'';
      var num=a.house_number||'';
      var suburb=a.suburb||a.neighbourhood||a.quarter||'';
      var city=a.city||a.town||a.municipality||a.village||a.county||'';
      var parts=[];
      if(road) parts.push(num?road+' '+num:road);
      if(suburb&&suburb!==city) parts.push(suburb);
      if(city) parts.push(city);
      return parts.length?parts.join(', '):(d.display_name||coords(lat,lng));
    })
    .catch(function(){return coords(lat,lng);});
}

function coords(lat,lng){return lat.toFixed(5)+', '+lng.toFixed(5);}

// ─── GPS ──────────────────────────────────────────────────────────────────────
if(navigator.geolocation){
  navigator.geolocation.watchPosition(function(pos){
    gpsLat=pos.coords.latitude;
    gpsLng=pos.coords.longitude;
    gpsSpeed=pos.coords.speed!=null?Math.round(pos.coords.speed*3.6):0;
    if(!gpsFix){
      gpsFix=true;
      reverseGeocode(gpsLat,gpsLng).then(function(a){gpsAddr=a;});
    }
  },function(){},{enableHighAccuracy:true,maximumAge:2000,timeout:15000});
}

// ─── CAMERA ───────────────────────────────────────────────────────────────────
function startCam(){
  return new Promise(function(resolve){
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      showToast('X',location.protocol==='http:'?'HTTPS required':'Camera API unavailable');
      return resolve(false);
    }
    if(mediaStream) stopCam();
    navigator.mediaDevices.getUserMedia({video:{facingMode:facingMode},audio:true})
      .catch(function(){return navigator.mediaDevices.getUserMedia({video:true,audio:true});})
      .then(function(stream){
        mediaStream=stream; video.srcObject=stream; return video.play();
      })
      .then(function(){
        function applyDims(){
          if(video.videoWidth>0){canvas.width=video.videoWidth;canvas.height=video.videoHeight;}
        }
        if(video.videoWidth>0) applyDims();
        else video.addEventListener('loadedmetadata',applyDims,{once:true});
        resolve(true);
      })
      .catch(function(e){
        var msg=e.name==='NotAllowedError'?'Camera denied.\nSettings > Safari > Camera > Allow'
               :e.name==='NotReadableError'?'Camera in use by another app'
               :e.name+': '+e.message;
        showToast('X',msg); resolve(false);
      });
  });
}

function stopCam(){
  if(mediaStream){mediaStream.getTracks().forEach(function(t){t.stop();});mediaStream=null;}
  video.srcObject=null;
}

function flipCam(){
  facingMode=facingMode==='environment'?'user':'environment';
  var was=isRecording;
  if(was) stopRec();
  if(mediaStream) startCam().then(function(){if(was) beginRec();});
}

function setPreview(on){
  document.getElementById('viewport').classList.toggle('preview-off',!on);
}

// ─── MIME ─────────────────────────────────────────────────────────────────────
function bestMime(){
  var list=['video/mp4;codecs=avc1,mp4a.40.2','video/mp4;codecs=avc1','video/mp4',
            'video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm'];
  for(var i=0;i<list.length;i++) if(MediaRecorder.isTypeSupported(list[i])) return list[i];
  return '';
}

function makeMR(stream){
  var mime=bestMime();
  try{return new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:4000000});}
  catch(e){try{return new MediaRecorder(stream,{videoBitsPerSecond:4000000});}
           catch(e2){return new MediaRecorder(stream);}}
}

// ─── RECORDING ────────────────────────────────────────────────────────────────
// One recorder at a time. Runs for LOOP_SECS, stops, saves blob as prevBlob,
// immediately starts fresh. On incident: stop current recorder (grab its blob),
// start a short AFTER_SECS recorder, then combine prevBlob + currentBlob + afterBlob.
// No simultaneous recorders = works on iOS.

var prevBlob    = null;  // last completed 20s blob
var prevStartMs = 0;     // when prevBlob started recording
var prevEndMs   = 0;     // when prevBlob stopped
var curStartMs  = 0;     // when current recorder started
var curChunks   = [];    // accumulates chunks from current recA
var loopTimer   = null;
var afterRec    = null;  // short recorder for the 5s after window

function toggleRec(){
  if(isRecording) stopRec();
  else startCam().then(function(ok){if(ok) beginRec();});
}

function beginRec(){
  isRecording=true; incidentActive=false; prevBlob=null; curChunks=[];
  canvasStream=canvas.captureStream(30);
  if(mediaStream) mediaStream.getAudioTracks().forEach(function(t){canvasStream.addTrack(t);});
  launchCurrent();
  setRecUI(true);
  reqWakeLock();
}

function launchCurrent(){
  curStartMs = Date.now();
  curChunks  = [];
  recA = makeMR(canvasStream);
  recA.ondataavailable = function(e){
    if(e.data && e.data.size > 0) curChunks.push(e.data);
  };
  recA.start(500);  // timeslice: fire ondataavailable every 500ms
  loopTimer = setTimeout(rotateCurrent, LOOP_SECS * 1000);
}

function rotateCurrent(){
  // Stop current, save blob, start fresh immediately
  clearTimeout(loopTimer); loopTimer = null;
  var tStart  = curStartMs;
  var chunks  = curChunks;  // snapshot current chunks
  var mime    = recA.mimeType || bestMime();
  recA.ondataavailable = function(e){
    // Capture final chunk
    if(e.data && e.data.size > 0) chunks.push(e.data);
    if(chunks.length){
      prevBlob    = new Blob(chunks, {type: mime});
      prevStartMs = tStart;
      prevEndMs   = Date.now();
    }
    if(isRecording && !incidentActive) launchCurrent();
  };
  recA.stop();
}

function stopRec(){
  clearTimeout(loopTimer); loopTimer=null;
  clearTimeout(afterTimer); afterTimer=null;
  stopCountdown();
  if(recA && recA.state!=='inactive'){ recA.ondataavailable=function(){}; recA.stop(); }
  if(afterRec && afterRec.state!=='inactive'){ afterRec.ondataavailable=function(){}; afterRec.stop(); }
  recA=null; afterRec=null; canvasStream=null; prevBlob=null; curChunks=[];
  isRecording=false; incidentActive=false;
  setRecUI(false);
  document.getElementById('buf-bar').style.width='0';
  document.getElementById('inc-btn').disabled=true;
}

function setRecUI(on){
  document.getElementById('rec-btn').classList.toggle('on',on);
  document.getElementById('rec-ind').classList.toggle('on',on);
  document.getElementById('rec-status').textContent=on?'REC':'STANDBY';
  document.getElementById('rec-lbl').textContent=on?'STOP':'START';
  document.getElementById('inc-btn').disabled=!on;
}

setInterval(function(){
  if(isRecording && !incidentActive){
    var pct;
    if(prevBlob){
      // Show how far into current window we are (resets each 20s cycle)
      pct = Math.min(99, (Date.now()-curStartMs) / (LOOP_SECS*1000) * 100);
      // Keep bar showing we have the 20s back — show it as a second color via full bar
      pct = 100; // always full once prevBlob exists
    } else {
      pct = Math.min(99, (Date.now()-curStartMs) / (LOOP_SECS*1000) * 100);
    }
    document.getElementById('buf-bar').style.width = pct+'%';
  }
}, 300);

// ─── INCIDENT ─────────────────────────────────────────────────────────────────
// 1. Cancel loop rotation
// 2. Stop current recorder → get currentBlob (everything since last rotate)
// 3. Start afterRec for AFTER_SECS → get afterBlob
// 4. Combine prevBlob + currentBlob + afterBlob

function onIncident(){
  if(!isRecording || incidentActive) return;
  incidentActive = true;
  incidentMs = Date.now();
  clearTimeout(loopTimer); loopTimer = null;

  var lat=gpsLat, lng=gpsLng;
  geoPromise = lat!==null ? reverseGeocode(lat,lng) : Promise.resolve(null);

  flashViewport();
  startCountdown();
  document.getElementById('inc-btn').disabled = true;

  // Snapshot whatever is already buffered in curChunks — no need to stop recA.
  // recA.stop() on iOS is unreliable for getting the final chunk synchronously.
  // We already have all data up to the last 500ms timeslice in curChunks.
  var tCurStart   = curStartMs;
  var mime        = recA.mimeType || bestMime();
  var currentBlob = curChunks.length ? new Blob(curChunks, {type: mime}) : null;

  // Stop recA cleanly (no ondataavailable needed — we already have the data)
  recA.ondataavailable = function(){};
  recA.stop();

  startAfterRec(currentBlob, tCurStart);
}

function startAfterRec(currentBlob, tCurStart){
  var afterChunks = [];
  afterRec = makeMR(canvasStream);
  afterRec.ondataavailable = function(e){
    if(e.data && e.data.size > 0) afterChunks.push(e.data);
  };
  afterRec.start(500);

  afterTimer = setTimeout(function(){
    stopCountdown();
    var stopMs = Date.now();
    var mime   = afterRec.mimeType || bestMime();

    // Snapshot what's already in afterChunks from timeslice events
    var afterBlob = afterChunks.length ? new Blob(afterChunks, {type: mime}) : null;

    // Stop cleanly — we don't need the final ondataavailable
    afterRec.ondataavailable = function(){};
    afterRec.stop();

    geoPromise.then(function(addr){ finalize(currentBlob, afterBlob, tCurStart, stopMs, addr); });
  }, AFTER_SECS * 1000);
}

function finalize(currentBlob, afterBlob, tCurStart, stopMs, resolvedAddr){
  var parts = [];
  if(prevBlob)    parts.push(prevBlob);
  if(currentBlob) parts.push(currentBlob);
  if(afterBlob)   parts.push(afterBlob);

  if(!parts.length){
    showToast('!','No video data.\nRecord for a few seconds first.');
    resetIncident(); return;
  }
  showSaving();

  var mime = (currentBlob||afterBlob||prevBlob).type || bestMime();
  var ext  = (mime.indexOf('mp4')>-1||mime.indexOf('avc')>-1)?'mp4':'webm';
  var combined = new Blob(parts, {type:mime});

  var ts    = new Date(incidentMs);
  var dtStr = ts.toISOString().replace(/[:.]/g,'-').slice(0,19);
  var fname = 'INCIDENT_'+dtStr+'.'+ext;
  var addr  = resolvedAddr||gpsAddr||(gpsLat!==null?coords(gpsLat,gpsLng):'--');

  var startOfClip = prevBlob ? prevStartMs : tCurStart;
  var beforeSec   = ((incidentMs - startOfClip) / 1000).toFixed(1);
  var afterSec    = ((stopMs - incidentMs) / 1000).toFixed(1);

  var url = URL.createObjectURL(combined);
  clips.push({
    id:Date.now(), name:fname, url:url, blob:combined, size:combined.size,
    ts:ts.toLocaleString(), address:addr, ext:ext,
    info:'-'+beforeSec+'s / +'+afterSec+'s'
  });

  updateClipsUI();
  hideSaving();
  autoDownload(url, fname);
  showToast('OK','Saved: -'+beforeSec+'s / +'+afterSec+'s\n'+addr);
  resetIncident();
}

function resetIncident(){
  incidentActive=false; geoPromise=null; afterTimer=null; afterRec=null;
  if(isRecording){
    prevBlob=null;
    launchCurrent();
    document.getElementById('inc-btn').disabled=false;
  }
}

// ─── COUNTDOWN ────────────────────────────────────────────────────────────────
function startCountdown(){
  var el=document.getElementById('countdown-el');
  var num=document.getElementById('countdown-num');
  el.style.display='flex';
  var t0=Date.now();
  function tick(){
    var r=Math.max(0,AFTER_SECS-(Date.now()-t0)/1000);
    num.textContent='+'+r.toFixed(1)+'s';
    if(r>0) countdownRaf=requestAnimationFrame(tick);
  }
  tick();
}

function stopCountdown(){
  if(countdownRaf){cancelAnimationFrame(countdownRaf);countdownRaf=null;}
  document.getElementById('countdown-el').style.display='none';
}

// ─── CLIPS ────────────────────────────────────────────────────────────────────
function updateClipsUI(){
  var n=clips.length;
  document.getElementById('clip-num').textContent=n;
  document.getElementById('fab-count').textContent=n;
  document.getElementById('fab-count').classList.toggle('show',n>0);
}

function renderClips(){
  var body=document.getElementById('clips-body');
  document.getElementById('clips-empty').style.display=clips.length?'none':'block';
  body.querySelectorAll('.clip-item').forEach(function(el){el.remove();});
  clips.slice().reverse().forEach(function(c){
    var el=document.createElement('div'); el.className='clip-item';
    el.innerHTML=
      '<div class="clip-info">'+
        '<div class="clip-name">'+c.name+'</div>'+
        '<div class="clip-meta">'+c.ts+' &middot; '+(c.size/1048576).toFixed(1)+'MB'+(c.info?' &middot; '+c.info:'')+'</div>'+
        '<div class="clip-addr">'+(c.address||'--')+'</div>'+
      '</div>'+
      '<div class="clip-btns">'+
        '<button class="clip-btn share" onclick="shareClip('+c.id+')">SHARE</button>'+
      '</div>';
    body.appendChild(el);
  });
}

function openClips(){document.getElementById('clips-panel').classList.add('open');renderClips();}
function closeClips(){document.getElementById('clips-panel').classList.remove('open');}

function shareClip(id){
  var c=clips.find(function(x){return x.id===id;}); if(!c) return;
  var file=new File([c.blob],c.name,{type:c.blob.type});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    navigator.share({title:'DashCam Incident',text:c.address+'\n'+c.ts,files:[file]})
      .catch(function(e){if(e.name!=='AbortError') autoDownload(c.url,c.name);});
  } else {
    autoDownload(c.url,c.name);
    showToast('DL','Download started.');
  }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function autoDownload(url,name){
  var a=document.createElement('a'); a.href=url; a.download=name; a.style.display='none';
  document.body.appendChild(a); a.click();
  setTimeout(function(){document.body.removeChild(a);},1000);
}

function flashViewport(){
  var el=document.getElementById('flash-el');
  el.classList.remove('go'); void el.offsetWidth; el.classList.add('go');
}

function showSaving(){document.getElementById('saving').classList.add('show');}
function hideSaving(){document.getElementById('saving').classList.remove('show');}

function showToast(icon,msg){
  var icons={'OK':'&#x2705;','!':'&#x26A0;&#xFE0F;','X':'&#x274C;','DL':'&#x1F4E5;'};
  document.getElementById('toast-icon').innerHTML=icons[icon]||icon;
  document.getElementById('toast-msg').innerHTML=msg.replace(/\n/g,'<br>');
  document.getElementById('toast').classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){document.getElementById('toast').classList.remove('show');},5000);
}

function reqWakeLock(){
  if('wakeLock' in navigator)
    navigator.wakeLock.request('screen').then(function(wl){wakeLock=wl;}).catch(function(){});
}
document.addEventListener('visibilitychange',function(){
  if(wakeLock&&document.visibilityState==='visible') reqWakeLock();
});
</script>
</body>
</html>
